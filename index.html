<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be My Valentine? ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff4d6d,#ff8fa3,#ffc2d1);
    overflow:hidden;
}

.container{
    background:white;
    width:450px;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    color:#ff4d6d;
    margin-bottom:15px;
}

p{
    color:#555;
    margin-bottom:20px;
}

.buttons{
    position:relative;
    height:120px;
}

button{
    padding:12px 28px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:18px;
    transition:.3s;
}

#yesBtn{
    background:#ff4d6d;
    color:white;
}

#yesBtn:hover{
    transform:scale(1.08);
}

#noBtn{
    background:#777;
    color:white;
    position:absolute;
    left:230px;
}

#lovePage{
    display:none;
}

img{
    width:250px;
    height:250px;
    object-fit:cover;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}
</style>
</head>
<body>

<!-- PAGE 1 -->
<div class="container" id="questionPage">
    <h1>MALAGAW KA BH?</h1>
    <p></p>

    <div class="buttons">
        <button id="yesBtn" onclick="showLovePage()">Yes </button>
        <button id="noBtn" onmouseover="moveButton()">No </button>
    </div>
</div>

<!-- PAGE 2 -->
<div class="container" id="lovePage">
    <img src="spiderman marvel studios_.jpg" alt="Valentine">

    <h1> </h1>

    <p>
        WAHHAHAHHAA <br><br>
       
     
    </p>
</div>

<script>
let tries = 0;

function moveButton(){
    tries++;

    const noBtn = document.getElementById("noBtn");

    if(tries >= 3){
        noBtn.style.display = "none";
        return;
    }

    let x = Math.random() * 250;
    let y = Math.random() * 80;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

function showLovePage(){
    document.getElementById("questionPage").style.display = "none";
    document.getElementById("lovePage").style.display = "block";
}
</script>

</body>
</html>
